name: Build TempRoot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/TempRoot-debug.apk || true

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: temproot-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: TempRoot v1.0.${{ github.run_number }}
        body: |
          TempRoot 一键临时 Root 工具

          **功能：**
          - 基于 KernelSU late-load 注入
          - 通过 Shizuku 执行 Shell 命令
          - 支持 HyperOS/MIUI 特定机型

          **使用方法：**
          1. 安装并启动 Shizuku
          2. 安装本 APK
          3. 授予 Shizuku 权限
          4. 点击一键 Root

          **注意：** 临时 Root，重启后失效
        files: app/build/outputs/apk/debug/*.apk
